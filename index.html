<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRICKCAST - TATA IPL 2026</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #1a0f2e, #05070a);
    font-family: 'Poppins', sans-serif;
    color: #fff;
}

/* AD OVERLAY */
#ad-overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 9999;
    cursor: pointer;
}

/* HEADER */
.header {
    padding: 18px;
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: #ff4ecd;
}

/* DROPDOWN */
#channelDropdown {
    width: 92%;
    margin: 10px auto;
    padding: 10px;
    background: #111;
    color: white;
    border: none;
}

/* PLAYER */
.player-card {
    width: 92%;
    margin: auto;
    padding: 10px;
    border-radius: 20px;
    background: linear-gradient(145deg, #2a1740, #140b24);
}

.video-container {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
}

video {
    width: 100%;
    height: 100%;
}

/* LIVE */
.live-box {
    margin: 12px auto;
    width: 90px;
    text-align: center;
    padding: 6px;
    border-radius: 20px;
    border: 1px solid red;
    color: red;
}

/* TITLE */
.match-title {
    text-align: center;
    font-size: 20px;
}

/* BANNER */
.ad-box {
    width: 92%;
    margin: 20px auto;
}

.ad-box img {
    width: 100%;
}
</style>

</head>

<body>

<div id="ad-overlay" onclick="openAd()"></div>

<div class="header">TATA IPL 2026</div>

<select id="channelDropdown"></select>

<div class="player-card">
    <div class="video-container">
        <video id="videoPlayer" playsinline controls></video>
    </div>
</div>

<div class="live-box">● LIVE</div>
<div class="match-title">KKR vs MI</div>

<div class="ad-box">
    <a href="https://wa.me/447955881183" target="_blank">
        <img src="https://github.com/Vk1817/IPL1/blob/main/offstumphd.jpg?raw=true">
    </a>
</div>

<script>
const API_URL = "https://tv1.akcoder777.workers.dev";

let player;
let allChannels = [];
let currentChannel = null;

const priorityOrder = [
    "star sports 1 hindi hd",
    "star sports 2 hindi hd",
    "star sports 1hd",
    "star sports 2 hd",
    "star sports kannada",
    "star sports telugu",
    "star sports tamil"
];

async function init() {
    const res = await fetch(API_URL);
    const data = await res.json();

    allChannels = data.filter(ch =>
        ch.channel_name.toLowerCase().includes("star sports")
    );

    // SORT
    allChannels.sort((a, b) => {
        const aName = a.channel_name.toLowerCase();
        const bName = b.channel_name.toLowerCase();

        const aIndex = priorityOrder.findIndex(p => aName.includes(p));
        const bIndex = priorityOrder.findIndex(p => bName.includes(p));

        if (aIndex !== -1 && bIndex !== -1) return aIndex - bIndex;
        if (aIndex !== -1) return -1;
        if (bIndex !== -1) return 1;

        return aName.localeCompare(bName);
    });

    createDropdown();

    if (allChannels.length > 0) {
        loadChannel(allChannels[0]);
    }
}

function createDropdown() {
    const dropdown = document.getElementById("channelDropdown");

    allChannels.forEach((ch, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.text = ch.channel_name;
        dropdown.appendChild(opt);
    });

    dropdown.onchange = (e) => {
        loadChannel(allChannels[e.target.value]);
    };
}

async function loadChannel(channel) {
    currentChannel = channel;

    if (player) {
        await player.destroy();
    }

    const video = document.getElementById("videoPlayer");

    shaka.polyfill.installAll();

    player = new shaka.Player(video);
    new shaka.ui.Overlay(player, document.querySelector(".video-container"), video);

    // ERROR LOG
    player.addEventListener('error', (e) => {
        console.log("ERROR:", e.detail);
    });

    player.configure({
        drm: {
            clearKeys: {
                [channel.keyId]: channel.key
            }
        }
    });

    // 🔥 FIXED HEADERS + TOKEN
    player.getNetworkingEngine().registerRequestFilter((type, request) => {

        request.headers["Referer"] = "https://www.jiotv.com/";
        request.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13)";

        if (channel.cookie) {
            request.headers["Cookie"] = channel.cookie;

            const match = channel.cookie.match(/__hdnea__=([^;]+)/);

            if (match) {
                const token = "__hdnea__=" + match[1];

                if (
                    type === shaka.net.NetworkingEngine.RequestType.SEGMENT ||
                    type === shaka.net.NetworkingEngine.RequestType.MANIFEST
                ) {
                    if (!request.uris[0].includes("__hdnea__")) {
                        request.uris[0] += (request.uris[0].includes("?") ? "&" : "?") + token;
                    }
                }
            }
        }
    });

    try {
        await player.load(channel.channel_url);
    } catch (err) {
        console.log("LOAD ERROR:", err);
    }
}

// AD CLICK
function openAd() {
    window.open("https://offstump.com/", "_blank");
    document.getElementById("ad-overlay").style.display = "none";
}

window.onload = init;
</script>

</body>
</html>

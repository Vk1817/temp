<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRICKCAST - TATA IPL 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #1a0f2e, #05070a);
    font-family: 'Poppins', sans-serif;
    color: #fff;
}

/* HEADER */
.header {
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    color: #ff4ecd;
}

/* DROPDOWN */
#channelDropdown {
    width: 90%;
    margin: 10px auto;
    display: block;
    padding: 12px;
    background: #0d1117;
    color: #fff;
    border: none;
    border-radius: 10px;
}

/* PLAYER CARD WITH GLOW */
.player-card {
    width: 90%;
    margin: 15px auto;
    padding: 12px;
    border-radius: 20px;
    background: linear-gradient(145deg, #2a1740, #140b24);
    box-shadow: 0 0 25px rgba(128,0,255,0.4);
}

/* VIDEO */
.video-container {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
}

.video-container iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* LIVE BUTTON */
.live-box {
    margin: 15px auto;
    width: 110px;
    text-align: center;
    padding: 8px;
    border-radius: 25px;
    border: 2px solid red;
    color: red;
    font-weight: 600;
}

/* MATCH TITLE */
.match-title {
    text-align: center;
    font-size: 20px;
    margin-top: 5px;
}

/* AD BANNER */
.ad-banner {
    width: 90%;
    margin: 15px auto;
}

.ad-banner img {
    width: 100%;
    border-radius: 8px;
}

/* TELEGRAM */
#telegramBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 55px;
    height: 55px;
    border-radius: 50%;
}

#telegramBtn img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
}
</style>
</head>

<body>

<div class="header">TATA IPL 2026</div>

<select id="channelDropdown"></select>

<div class="player-card">
    <div class="video-container">
        <iframe id="videoFrame" allowfullscreen allow="autoplay"></iframe>
    </div>
</div>

<div class="live-box">🔴 LIVE</div>
<div class="match-title" id="matchTitle">KKR vs MI</div>

<!-- AD BANNER -->
<div class="ad-banner">
    <img src="https://i.ibb.co/8gW3x8R/banner.jpg" alt="ad">
</div>

<a href="https://t.me/+BMRZLxqFMctjMjU1" target="_blank" id="telegramBtn">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</a>

<script>
const API = "https://raw.githubusercontent.com/vaathala00/jow/main/output.json";

let channels = [];

async function init() {
    const res = await fetch(API);
    const data = await res.json();

    channels = data.filter(ch =>
        ch.group && ch.group.toLowerCase().includes("sports")
    );

    const dropdown = document.getElementById("channelDropdown");

    channels.forEach((ch, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = ch.name;
        dropdown.appendChild(opt);
    });

    dropdown.onchange = (e) => {
        loadChannel(e.target.value);
    };

    loadChannel(0);
}

function loadChannel(index) {
    const ch = channels[index];
    const frame = document.getElementById("videoFrame");

    // 🔒 DO NOT TOUCH (WORKING)
    frame.src = ch.link;

    document.getElementById("matchTitle").innerText = ch.name;
    document.title = ch.name + " - Live";
}

window.onload = init;
</script>

</body>
</html>
